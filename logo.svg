<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%" fx="50%" fy="42%">
      <stop offset="0%" stop-color="#1C1C20"/>
      <stop offset="100%" stop-color="#09090B"/>
    </radialGradient>

    <filter id="pixelGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="ambient"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="tight"/>
      <feMerge>
        <feMergeNode in="ambient"/>
        <feMergeNode in="tight"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="iconClip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!--
      8-column pixel equalizer — symmetric triangle
      pixel=36, gap=10, step=46, rx=6
      8 cols → width=358, centered: x starts at 77
      Columns: 77, 123, 169, 215, 261, 307, 353, 399
      Rows bottom-aligned from y=376, step -46
      Heights: 1, 3, 5, 7, 7, 5, 3, 1 — triangle peak in center
      Opacity: top pixel 0.5, gradient to 1.0 at bottom
    -->
    <g filter="url(#pixelGlow)">

      <!-- Col 0 (x=77) — 1 pixel tall -->
      <rect x="77" y="376" width="36" height="36" rx="6" fill="#66E68D"/>

      <!-- Col 1 (x=123) — 3 pixels tall -->
      <rect x="123" y="284" width="36" height="36" rx="6" fill="#66E68D" opacity="0.5"/>
      <rect x="123" y="330" width="36" height="36" rx="6" fill="#66E68D" opacity="0.75"/>
      <rect x="123" y="376" width="36" height="36" rx="6" fill="#66E68D"/>

      <!-- Col 1 (x=169) — 5 pixels tall -->
      <rect x="169" y="192" width="36" height="36" rx="6" fill="#66E68D" opacity="0.5"/>
      <rect x="169" y="238" width="36" height="36" rx="6" fill="#66E68D" opacity="0.625"/>
      <rect x="169" y="284" width="36" height="36" rx="6" fill="#66E68D" opacity="0.75"/>
      <rect x="169" y="330" width="36" height="36" rx="6" fill="#66E68D" opacity="0.875"/>
      <rect x="169" y="376" width="36" height="36" rx="6" fill="#66E68D"/>

      <!-- Col 3 (x=215) — 7 pixels tall (peak) -->
      <rect x="215" y="100" width="36" height="36" rx="6" fill="#66E68D" opacity="0.5"/>
      <rect x="215" y="146" width="36" height="36" rx="6" fill="#66E68D" opacity="0.583"/>
      <rect x="215" y="192" width="36" height="36" rx="6" fill="#66E68D" opacity="0.667"/>
      <rect x="215" y="238" width="36" height="36" rx="6" fill="#66E68D" opacity="0.75"/>
      <rect x="215" y="284" width="36" height="36" rx="6" fill="#66E68D" opacity="0.833"/>
      <rect x="215" y="330" width="36" height="36" rx="6" fill="#66E68D" opacity="0.917"/>
      <rect x="215" y="376" width="36" height="36" rx="6" fill="#66E68D"/>

      <!-- Col 4 (x=261) — 7 pixels tall (peak) -->
      <rect x="261" y="100" width="36" height="36" rx="6" fill="#66E68D" opacity="0.5"/>
      <rect x="261" y="146" width="36" height="36" rx="6" fill="#66E68D" opacity="0.583"/>
      <rect x="261" y="192" width="36" height="36" rx="6" fill="#66E68D" opacity="0.667"/>
      <rect x="261" y="238" width="36" height="36" rx="6" fill="#66E68D" opacity="0.75"/>
      <rect x="261" y="284" width="36" height="36" rx="6" fill="#66E68D" opacity="0.833"/>
      <rect x="261" y="330" width="36" height="36" rx="6" fill="#66E68D" opacity="0.917"/>
      <rect x="261" y="376" width="36" height="36" rx="6" fill="#66E68D"/>

      <!-- Col 5 (x=307) — 5 pixels tall -->
      <rect x="307" y="192" width="36" height="36" rx="6" fill="#66E68D" opacity="0.5"/>
      <rect x="307" y="238" width="36" height="36" rx="6" fill="#66E68D" opacity="0.625"/>
      <rect x="307" y="284" width="36" height="36" rx="6" fill="#66E68D" opacity="0.75"/>
      <rect x="307" y="330" width="36" height="36" rx="6" fill="#66E68D" opacity="0.875"/>
      <rect x="307" y="376" width="36" height="36" rx="6" fill="#66E68D"/>

      <!-- Col 6 (x=353) — 3 pixels tall -->
      <rect x="353" y="284" width="36" height="36" rx="6" fill="#66E68D" opacity="0.5"/>
      <rect x="353" y="330" width="36" height="36" rx="6" fill="#66E68D" opacity="0.75"/>
      <rect x="353" y="376" width="36" height="36" rx="6" fill="#66E68D"/>

      <!-- Col 7 (x=399) — 1 pixel tall -->
      <rect x="399" y="376" width="36" height="36" rx="6" fill="#66E68D"/>
    </g>

    <rect x="1" y="1" width="510" height="510" rx="111" fill="none" stroke="white" stroke-width="0.5" opacity="0.06"/>
  </g>
</svg>
