name: thinkur
options:
  bundleIdPrefix: com.jyo
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.12.1"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.8.0"
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK.git
    from: "2.0.0"
  swift-sdk:
    url: https://github.com/modelcontextprotocol/swift-sdk.git
    from: "0.11.0"

targets:
  thinkur:
    type: application
    platform: macOS
    sources:
      - Sources/thinkur
    dependencies:
      - package: FluidAudio
      - package: Sparkle
      - package: TelemetryDeck
        product: TelemetryDeck
      - target: thinkur-mcp
        embed: true
        codeSign: true
        copy:
          destination: executables
    settings:
      base:
        INFOPLIST_FILE: Sources/thinkur/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/thinkur/Resources/thinkur.entitlements
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: false
        DEVELOPMENT_TEAM: YZ9FFMX8QS
        ENABLE_HARDENED_RUNTIME: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        OTHER_LDFLAGS:
          - "-lc++"
      configs:
        debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
          PRODUCT_BUNDLE_IDENTIFIER: com.jyo.thinkur.dev
          PRODUCT_NAME: "thinkur Dev"
          THINKUR_APP_MODE: dev
          THINKUR_SUPPORT_DIR_NAME: thinkur-dev
          THINKUR_ENABLE_SPARKLE: "NO"
          THINKUR_SU_FEED_URL: ""
          THINKUR_ENABLE_TELEMETRY: "NO"
          THINKUR_SHARED_LICENSE_SERVICE: com.jyo.thinkur.license
          THINKUR_SECRET_SERVICE_PREFIX: com.jyo.thinkur.dev
        release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          OTHER_CODE_SIGN_FLAGS: "--timestamp --options runtime"
          PRODUCT_BUNDLE_IDENTIFIER: com.jyo.thinkur
          PRODUCT_NAME: thinkur
          THINKUR_APP_MODE: release
          THINKUR_SUPPORT_DIR_NAME: thinkur
          THINKUR_ENABLE_SPARKLE: "YES"
          THINKUR_SU_FEED_URL: "https://thinkur.app/appcast.xml"
          THINKUR_ENABLE_TELEMETRY: "YES"
          THINKUR_SHARED_LICENSE_SERVICE: com.jyo.thinkur.license
          THINKUR_SECRET_SERVICE_PREFIX: com.jyo.thinkur
    entitlements:
      path: Sources/thinkur/Resources/thinkur.entitlements
      properties:
        com.apple.security.device.audio-input: true

  thinkur-mcp:
    type: tool
    platform: macOS
    sources:
      - Sources/thinkur-mcp
    dependencies:
      - package: swift-sdk
        product: MCP
    settings:
      base:
        PRODUCT_NAME: thinkur-mcp
        PRODUCT_BUNDLE_IDENTIFIER: com.jyo.thinkur-mcp
        DEVELOPMENT_TEAM: YZ9FFMX8QS
        ENABLE_HARDENED_RUNTIME: true
      configs:
        debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          OTHER_CODE_SIGN_FLAGS: "--timestamp --options runtime"

  thinkurTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/thinkurTests
    dependencies:
      - target: thinkur
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jyo.thinkurTests
        GENERATE_INFOPLIST_FILE: true

schemes:
  thinkur:
    build:
      targets:
        thinkur: all
        thinkur-mcp: all
        thinkurTests: [test]
      postActions:
        - script: |
            if [ "${CONFIGURATION}" = "Debug" ]; then
              "${PROJECT_DIR}/scripts/install-dev-app.sh" \
                "${BUILT_PRODUCTS_DIR}/${FULL_PRODUCT_NAME}"
            fi
          name: "Install Dev app (Debug only)"
          settingsTarget: thinkur
    test:
      targets:
        - thinkurTests
    archive:
      config: Release
