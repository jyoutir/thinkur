name: thinkur
options:
  bundleIdPrefix: com.jyo
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"

targets:
  thinkur:
    type: application
    platform: macOS
    sources:
      - Sources/thinkur
    dependencies:
      - package: WhisperKit
    settings:
      base:
        INFOPLIST_FILE: Sources/thinkur/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/thinkur/Resources/thinkur.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.jyo.thinkur
        PRODUCT_NAME: thinkur
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: YZ9FFMX8QS
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_HARDENED_RUNTIME: false
    entitlements:
      path: Sources/thinkur/Resources/thinkur.entitlements
    preBuildScripts:
      - script: |
          # Prevent Spotlight from indexing the DerivedData build output
          mkdir -p "${BUILT_PRODUCTS_DIR}"
          touch "${BUILT_PRODUCTS_DIR}/.metadata_never_index"
        name: "Prevent Spotlight indexing of DerivedData"

schemes:
  thinkur:
    build:
      targets:
        thinkur: all
      postActions:
        - script: |
            # Kill running instance so copy doesn't fail on locked binary
            killall thinkur 2>/dev/null || true
            # Clean old copy (removes stale files inside .app bundle)
            rm -rf "/Applications/thinkur.app"
            # Copy fresh (signed) build
            cp -R "${BUILT_PRODUCTS_DIR}/thinkur.app" "/Applications/thinkur.app"
          name: "Copy thinkur.app to /Applications"
          settingsTarget: thinkur
