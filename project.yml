name: thinkur
options:
  bundleIdPrefix: com.jyo
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.12.1"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.8.0"
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK.git
    from: "2.0.0"

targets:
  thinkur:
    type: application
    platform: macOS
    sources:
      - Sources/thinkur
    dependencies:
      - package: FluidAudio
      - package: Sparkle
      - package: TelemetryDeck
        product: TelemetryDeck
    settings:
      base:
        INFOPLIST_FILE: Sources/thinkur/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/thinkur/Resources/thinkur.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.jyo.thinkur
        PRODUCT_NAME: thinkur
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: false
        DEVELOPMENT_TEAM: YZ9FFMX8QS
        ENABLE_HARDENED_RUNTIME: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          OTHER_CODE_SIGN_FLAGS: "--timestamp --options runtime"
    entitlements:
      path: Sources/thinkur/Resources/thinkur.entitlements
      properties:
        com.apple.security.device.audio-input: true

  thinkurTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/thinkurTests
    dependencies:
      - target: thinkur
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jyo.thinkurTests
        GENERATE_INFOPLIST_FILE: true

schemes:
  thinkur:
    build:
      targets:
        thinkur: all
        thinkurTests: [test]
      postActions:
        - script: |
            if [ "${CONFIGURATION}" = "Debug" ]; then
              # Clear stale TCC entries so the new binary gets fresh grants.
              # Without this, duplicate csreq entries accumulate and permissions break.
              for svc in Microphone Accessibility ListenEvent SpeechRecognition; do
                tccutil reset "$svc" com.jyo.thinkur 2>/dev/null || true
              done
            fi
          name: "Reset TCC permissions (Debug only)"
          settingsTarget: thinkur
    test:
      targets:
        - thinkurTests
    archive:
      config: Release
